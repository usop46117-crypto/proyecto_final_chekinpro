{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChekinPro{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }
        main {
            flex: 1;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/header.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Script global para SweetAlert2 (opcional, puedes borrar si no lo necesitas) -->
    <script>
        // Configuración global de SweetAlert2
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        // Función global para mostrar mensajes de éxito
        window.mostrarExito = function(mensaje) {
            Toast.fire({
                icon: 'success',
                title: mensaje,
                background: '#1e293b',
                color: '#fff',
                iconColor: '#10b981'
            });
        };

        // Función global para mostrar mensajes de error
        window.mostrarError = function(mensaje) {
            Toast.fire({
                icon: 'error',
                title: mensaje,
                background: '#1e293b',
                color: '#fff',
                iconColor: '#ef4444'
            });
        };

        // Función global para mostrar mensajes de advertencia
        window.mostrarAdvertencia = function(mensaje) {
            Toast.fire({
                icon: 'warning',
                title: mensaje,
                background: '#1e293b',
                color: '#fff',
                iconColor: '#f59e0b'
            });
        };

        // Función global para mostrar mensajes de información
        window.mostrarInfo = function(mensaje) {
            Toast.fire({
                icon: 'info',
                title: mensaje,
                background: '#1e293b',
                color: '#fff',
                iconColor: '#3b82f6'
            });
        };
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
